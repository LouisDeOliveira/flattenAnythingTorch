hydra:
  job:
    chdir: true

n_samples: 10000
n_steps: 5000
checkpoint_freq: 500
dataset: "general.ply"
log: true

# Subsampling options — omit (or set to null) to disable each one
n_diff_samples: 1024      # Jacobian conformality loss subset (null = all N)
unwrap_max_pts: 2048      # KNN unwrapping loss subset      (null = all N)
chamfer_chunk_size: 2048  # Chamfer distance row chunk size  (null = full matrix)
